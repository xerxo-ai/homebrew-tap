name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get package info
        id: package
        run: |
          VERSION=${{ github.event.client_payload.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Download and get SHA256
          curl -sL -o xerxo.tar.gz "https://files.pythonhosted.org/packages/source/x/xerxo/xerxo-${VERSION}.tar.gz"
          SHA256=$(shasum -a 256 xerxo.tar.gz | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION=${{ steps.package.outputs.version }}
          SHA256=${{ steps.package.outputs.sha256 }}
          
          cat > Formula/xerxo.rb << EOF
          class Xerxo < Formula
            include Language::Python::Virtualenv

            desc "AI-powered business operations CLI - chat with agents, run workflows, manage tasks"
            homepage "https://xerxo.ai"
            url "https://files.pythonhosted.org/packages/source/x/xerxo/xerxo-${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "python@3.11"

            def install
              virtualenv_install_with_resources
            end

            def caveats
              <<~EOS
                To get started, run:
                  xerxo setup

                For interactive AI chat:
                  xerxo agent chat

                For the full Terminal UI:
                  xerxo tui
              EOS
            end

            test do
              assert_match "xerxo", shell_output("#{bin}/xerxo --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/xerxo.rb
          git commit -m "Update xerxo to v${{ steps.package.outputs.version }}"
          git push
